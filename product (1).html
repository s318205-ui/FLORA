<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>酷崎蛋糕工房 | 商品</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Caveat:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#fdf6ec;--warm:#f5e6cc;--caramel:#c8853a;--dark:#3a2a1a;--muted:#8a6d50;--accent:#e05c2a;--light:#fff9f2;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--cream);color:var(--dark);font-family:'Noto Sans TC',sans-serif;font-weight:300;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:999;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:64px;background:rgba(253,246,236,.93);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,133,58,.2);}
.nav-logo{font-family:'Caveat',cursive;font-size:1.55rem;font-weight:700;color:var(--caramel);text-decoration:none;}
.nav-logo span{color:var(--accent);}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{text-decoration:none;color:var(--muted);font-size:.82rem;font-weight:500;letter-spacing:.08em;padding:.25rem 0;border-bottom:2px solid transparent;transition:.2s;}
.nav-links a:hover,.nav-links a.active{color:var(--caramel);border-color:var(--caramel);}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;}
.hamburger span{display:block;width:24px;height:2px;background:var(--dark);}

.page-hero{margin-top:64px;height:280px;overflow:hidden;background:#E8A030;}
.page-hero img{width:100%;height:100%;object-fit:contain;background:#E8A030;display:block;}
.page-hero-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(30,18,8,.6) 0%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:2.5rem 8%;}
.hero-label{font-family:'Caveat',cursive;font-size:1.05rem;color:var(--warm);letter-spacing:.12em;margin-bottom:.5rem;}
.hero-title{font-family:'Noto Serif TC',serif;font-size:2.6rem;font-weight:900;color:#fff;text-shadow:0 3px 18px rgba(0,0,0,.3);}

/* PRODUCTS AREA */
.products-area{padding:3rem 8%;}

/* FILTER TABS */
.filter-tabs{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:2.5rem;}
.tab-btn{border:1.5px solid rgba(200,133,58,.35);background:transparent;color:var(--muted);padding:.45rem 1.2rem;border-radius:99px;font-size:.8rem;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:.25s;letter-spacing:.05em;}
.tab-btn:hover{border-color:var(--caramel);color:var(--caramel);}
.tab-btn.active{background:var(--caramel);color:#fff;border-color:var(--caramel);}

/* STATUS BADGE */
.status-badge{display:inline-block;font-size:.68rem;padding:.18rem .55rem;border-radius:2px;margin-bottom:.4rem;}
.status-on{background:#d4edda;color:#2d6a4f;}
.status-off{background:#f8d7da;color:#842029;}

/* GRID */
.products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.6rem;}
.product-card{background:var(--light);border-radius:6px;overflow:hidden;box-shadow:0 2px 16px rgba(58,42,26,.07);transition:transform .3s,box-shadow .3s;cursor:pointer;}
.product-card:hover{transform:translateY(-7px);box-shadow:0 10px 36px rgba(58,42,26,.14);}
.product-card img{width:100%;height:210px;object-fit:cover;display:block;transition:transform .5s;}
.product-card:hover img{transform:scale(1.06);}
.card-body{padding:1.2rem;}
.card-name{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;margin-bottom:.3rem;}
.card-price{font-size:.8rem;color:var(--accent);font-weight:500;margin-bottom:.5rem;}
.card-desc{font-size:.77rem;color:var(--muted);line-height:1.75;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

/* PAGINATION */
.pagination{display:flex;justify-content:center;align-items:center;gap:.5rem;margin-top:3rem;}
.page-btn{border:1.5px solid rgba(200,133,58,.3);background:transparent;color:var(--muted);width:38px;height:38px;border-radius:50%;font-size:.85rem;cursor:pointer;transition:.25s;display:flex;align-items:center;justify-content:center;}
.page-btn:hover,.page-btn.active{background:var(--caramel);color:#fff;border-color:var(--caramel);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(30,18,8,.6);z-index:500;align-items:center;justify-content:center;padding:1.5rem;}
.modal-bg.open{display:flex;}
.modal{background:var(--light);border-radius:8px;max-width:540px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalIn .3s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.modal img{width:100%;height:260px;object-fit:cover;}
.modal-body{padding:1.5rem;}
.modal-name{font-family:'Noto Serif TC',serif;font-size:1.3rem;font-weight:900;margin-bottom:.4rem;}
.modal-price{color:var(--accent);font-weight:600;font-size:.9rem;margin-bottom:.8rem;}
.modal-desc{font-size:.85rem;color:var(--muted);line-height:2;}
.modal-close{display:block;margin-top:1.2rem;border:1.5px solid var(--caramel);background:transparent;color:var(--caramel);padding:.5rem 1.4rem;border-radius:2px;cursor:pointer;font-size:.82rem;letter-spacing:.08em;transition:.25s;}
.modal-close:hover{background:var(--caramel);color:#fff;}

/* LOADING */
.loading{text-align:center;padding:4rem;color:var(--muted);font-size:.9rem;}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid rgba(200,133,58,.25);border-top-color:var(--caramel);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:.8rem;}
@keyframes spin{to{transform:rotate(360deg);}}

footer{background:#261a0e;color:rgba(245,230,204,.45);text-align:center;padding:1.8rem 1rem;font-size:.76rem;letter-spacing:.07em;}
footer a{color:var(--caramel);text-decoration:none;margin:0 .5rem;}
footer .footer-links{margin-top:.55rem;}

@media(max-width:900px){.products-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:700px){
  .nav-links{display:none;position:fixed;top:64px;left:0;right:0;background:var(--cream);flex-direction:column;padding:1.5rem 2rem;border-bottom:1px solid rgba(200,133,58,.2);gap:1.2rem;z-index:199;}
  .nav-links.open{display:flex;}
  .hamburger{display:flex;}
  .products-grid{grid-template-columns:1fr;}
  .page-hero{margin-top:64px;height:280px;overflow:hidden;background:#E8A030;}
  .hero-title{font-size:1.8rem;}
  .products-area{padding:2rem 5%;}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">酷崎 <span>蛋糕工房</span></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">首頁</a></li>
    <li><a href="story.html">店家故事</a></li>
    <li><a href="product.html" class="active">商品</a></li>
    <li><a href="about.html">生活風格誌</a></li>
    <li><a href="contact.html">聯絡我們</a></li>
  </ul>
  <div class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')"><span></span><span></span><span></span></div>
</nav>

<div class="page-hero">
  <img src="https://s318205-ui.github.io/FLORA/1.jpg" alt="酷崎蛋糕工房"/>
</div>
    <div class="hero-title">每日新鮮好味道</div>
  </div>
</div>

<div class="products-area">
  <div class="filter-tabs" id="filterTabs">
    <button class="tab-btn active" data-cat="全部">全部</button>
  </div>
  <div id="productGrid" class="products-grid">
    <div class="loading" style="grid-column:1/-1">
      <div class="spinner"></div><br>正在載入商品資料…
    </div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <img id="modalImg" src="" alt=""/>
    <div class="modal-body">
      <div class="modal-name" id="modalName"></div>
      <div class="modal-price" id="modalPrice"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <button class="modal-close" onclick="closeModal()">關閉</button>
    </div>
  </div>
</div>

<footer>
  <p>© Ku Chi Cake Workshop. All rights reserved.</p>
  <div class="footer-links">
    <a href="index.html">首頁</a><a href="story.html">店家故事</a><a href="product.html">商品</a><a href="about.html">生活風格誌</a><a href="contact.html">聯絡我們</a>
  </div>
</footer>

<script>
// ──────────────────────────────────────────────────────────────
// 設定你的 GAS Web App 網址（部署後替換）
// ──────────────────────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzwGf90o4gEgRmKScM5FzHrv910TRrKzqhOvOb1ouck4wZAy9a-RZD-foRbY0Knoh-aOw/exec';

// 如果 GAS 尚未設定，使用靜態資料作為備用
const FALLBACK_DATA = [
  {id:1,name:'北海道半熟乳酪',price:'1個45元 / 1盒225元',img:'https://s318205-ui.github.io/123/images/01.jpg',desc:'完美拿捏半熟烘焙火候，外層細緻、內餡濕潤綿密，濃郁奶香在舌尖輕柔化開，讓人欲罷不能。',category:'乳酪系列',status:'上架'},
  {id:2,name:'焦糖脆脆小泡芙',price:'1包120元',img:'https://s318205-ui.github.io/123/images/02.jpg',desc:'特製的小泡芙脆皮裹上香濃焦糖，口感香脆、微甜迷人。不論是單吃當零嘴，還是自己DIY沾冰淇淋、配牛奶都超百搭！',category:'泡芙系列',status:'上架'},
  {id:3,name:'北海道雪藏檸檬乳酪',price:'1個50元',img:'https://s318205-ui.github.io/123/images/03.jpg',desc:'嚴選頂級乳酪打造出雪藏般的絲滑口感，融入清新檸檬香氣，綿密清爽、酸甜不膩口。',category:'乳酪系列',status:'上架'},
  {id:4,name:'北海道雪藏咖啡乳酪',price:'1個50元',img:'https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81?w=400&q=80',desc:'濃郁細緻的乳酪中注入優雅的咖啡香氣，微苦與香甜完美交織，每一口都是大人專屬的療癒享受。',category:'乳酪系列',status:'上架'},
  {id:5,name:'草莓生乳捲',price:'1條280元',img:'https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=400&q=80',desc:'以北海道生奶油為基底，包裹新鮮草莓，入口即化的細膩口感讓人念念不忘。',category:'蛋糕捲',status:'上架'},
  {id:6,name:'虎皮蛋糕捲',price:'1條250元',img:'https://images.unsplash.com/photo-1602351447937-745cb720612f?w=400&q=80',desc:'外皮烤出特有的虎紋花樣，內餡奶香濃郁，是台式傳統烘焙的經典代表。',category:'蛋糕捲',status:'上架'},
  {id:7,name:'巧克力熔岩球',price:'1個55元',img:'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=400&q=80',desc:'外層微脆，內藏濃郁巧克力漿，溫熱享用時緩緩流出，每口都是幸福。',category:'巧克力系列',status:'上架'},
  {id:8,name:'抹茶紅豆麻糬',price:'1個45元',img:'https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=400&q=80',desc:'嚴選宇治抹茶粉與北海道紅豆，外層Q彈麻糬裹住濃郁內餡，日式風味完美呈現。',category:'日式系列',status:'上架'},
  {id:9,name:'伯爵茶磅蛋糕',price:'1條220元',img:'https://images.unsplash.com/photo-1587668178277-295251f900ce?w=400&q=80',desc:'精選TWG伯爵紅茶融入磅蛋糕，奶油香與茶香交織，口感扎實而回甘，是下午茶的最佳伴侶。',category:'磅蛋糕',status:'上架'},
  {id:10,name:'鹹奶油餅乾',price:'1包90元',img:'https://images.unsplash.com/photo-1558961363-fa8fdf82db35?w=400&q=80',desc:'使用法國發酵奶油，每片餅乾都薄脆酥香，甜鹹平衡讓人一片接一片停不下來。',category:'餅乾系列',status:'上架'},
  {id:11,name:'玫瑰荔枝塔',price:'1個65元',img:'https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400&q=80',desc:'以玫瑰奶凍與荔枝果凍疊層，擺放上真實玫瑰花瓣，既是甜點也是藝術品。',category:'塔類系列',status:'上架'},
  {id:12,name:'柚子松露巧克力',price:'1盒180元',img:'https://images.unsplash.com/photo-1548907040-4baa42d10919?w=400&q=80',desc:'天然柚子皮提取物融入黑巧克力內餡，清雅果香與可可苦韻交融，送禮自用兩相宜。',category:'巧克力系列',status:'上架'},
];

const PER_PAGE = 9;
let allProducts = [];
let filteredProducts = [];
let currentPage = 1;
let currentCat = '全部';

async function loadProducts(){
  try{
    const resp = await fetch(`${GAS_URL}?action=getProducts`,{method:'GET'});
    const data = await resp.json();
    if(data && Array.isArray(data.products)) return data.products;
  }catch(e){}
  return FALLBACK_DATA;
}

function buildCategories(products){
  const cats = ['全部',...new Set(products.filter(p=>p.category).map(p=>p.category))];
  const tabs = document.getElementById('filterTabs');
  tabs.innerHTML = '';
  cats.forEach(cat=>{
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (cat===currentCat?' active':'');
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.onclick = ()=>{ currentCat=cat; currentPage=1; filterAndRender(); };
    tabs.appendChild(btn);
  });
}

function filterAndRender(){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===currentCat));
  filteredProducts = currentCat==='全部' ? allProducts.filter(p=>p.status==='上架') : allProducts.filter(p=>p.status==='上架'&&p.category===currentCat);
  renderProducts();
  renderPagination();
}

function getFallbackImg(idx){
  const fallbacks=['https://images.unsplash.com/photo-1567324216289-e82a6b4acc85?w=400&q=75','https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&q=75','https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=400&q=75','https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81?w=400&q=75'];
  return fallbacks[idx%fallbacks.length];
}

function renderProducts(){
  const grid = document.getElementById('productGrid');
  const start = (currentPage-1)*PER_PAGE;
  const page = filteredProducts.slice(start,start+PER_PAGE);
  if(!page.length){ grid.innerHTML='<div class="loading" style="grid-column:1/-1">暫無此分類商品</div>'; return; }
  grid.innerHTML='';
  page.forEach((p,i)=>{
    const card = document.createElement('div');
    card.className='product-card';
    card.style.animationDelay=`${i*.07}s`;
    const fb=getFallbackImg(p.id||i);
    card.innerHTML=`<img src="${p.img||fb}" alt="${p.name}" onerror="this.src='${fb}'"/>
    <div class="card-body">
      <span class="status-badge ${p.status==='上架'?'status-on':'status-off'}">${p.status}</span>
      <div class="card-name">${p.name}</div>
      <div class="card-price">${p.price}</div>
      <div class="card-desc">${p.desc}</div>
    </div>`;
    card.onclick=()=>openModal(p,fb);
    grid.appendChild(card);
  });
}

function renderPagination(){
  const total = Math.ceil(filteredProducts.length/PER_PAGE);
  const pg = document.getElementById('pagination');
  pg.innerHTML='';
  if(total<=1) return;
  const prev=document.createElement('button');
  prev.className='page-btn';prev.textContent='‹';prev.disabled=currentPage===1;
  prev.onclick=()=>{if(currentPage>1){currentPage--;renderProducts();renderPagination();window.scrollTo(0,300);}};
  pg.appendChild(prev);
  for(let i=1;i<=total;i++){
    const btn=document.createElement('button');
    btn.className='page-btn'+(i===currentPage?' active':'');
    btn.textContent=i;
    btn.onclick=(function(n){return()=>{currentPage=n;renderProducts();renderPagination();window.scrollTo(0,300);};})(i);
    pg.appendChild(btn);
  }
  const next=document.createElement('button');
  next.className='page-btn';next.textContent='›';next.disabled=currentPage===total;
  next.onclick=()=>{if(currentPage<total){currentPage++;renderProducts();renderPagination();window.scrollTo(0,300);}};
  pg.appendChild(next);
}

function openModal(p,fb){
  document.getElementById('modalImg').src=p.img||fb;
  document.getElementById('modalImg').onerror=function(){this.src=fb;};
  document.getElementById('modalName').textContent=p.name;
  document.getElementById('modalPrice').textContent=p.price;
  document.getElementById('modalDesc').textContent=p.desc;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

(async()=>{
  allProducts = await loadProducts();
  buildCategories(allProducts);
  filteredProducts = allProducts.filter(p=>p.status==='上架');
  renderProducts();
  renderPagination();
})();
</script>
</body>
</html>
